<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediabibliotheek van Marije</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 10px;
            background-color: #f0f4f8;
        }
        .container {
            max-width: 100%;
            background: white;
            padding: 10px;
            border-radius: 8px;
        }
        h1 {
            text-align: center;
            color: #1a365d;
            margin-bottom: 15px;
        }
        .add-form {
            background: #f7fafc;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            margin-bottom: 10px;
            display: none;
        }
        .add-form input, .add-form select, .add-form textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 8px;
            border: 1px solid #cbd5e0;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .add-form textarea {
            min-height: 80px;
            resize: vertical;
        }
        .add-form button {
            padding: 10px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-top: 5px;
        }
        .add-form .cancel-button {
            background: #718096;
            margin-top: 0;
        }
        .buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .buttons button {
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .add-button {
            background: #2563eb;
            color: white;
        }
        .export-button {
            background: #1a365d;
            color: white;
        }
        .table-container {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #cbd5e0;
        }
        th {
            background: #e2e8f0;
            position: sticky;
            top: 0;
        }
        .poster-cell {
            width: 50px;
        }
        .poster-cell img {
            width: 100%;
            border-radius: 4px;
        }
        .actions button {
            padding: 4px 8px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-right: 4px;
        }
        .remove-button { background: #e53e3e; color: white; }
        .watched-button { background: #3182ce; color: white; }
        .edit-button { background: #4299e1; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mediabibliotheek van Marije</h1>
        
        <div class="search-box" style="margin-bottom: 10px;">
            <input type="text" id="librarySearchInput" placeholder="Zoek in bibliotheek..." style="width: 70%; padding: 8px; border: 1px solid #cbd5e0; border-radius: 4px; font-size: 14px;" onkeypress="if(event.key==='Enter') renderTable();">
            <button onclick="renderTable()" style="width: 28%; padding: 8px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px;">Zoeken</button>
        </div>
        
        <div class="filters" style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px;">
            <div style="display: flex; flex-direction: column; min-width: 120px;">
                <label style="font-size: 12px; font-weight: bold; margin-bottom: 2px;">Type:</label>
                <select id="typeFilter" onchange="renderTable()" style="padding: 6px; border: 1px solid #cbd5e0; border-radius: 4px; font-size: 12px;">
                    <option value="">Alle types</option>
                    <option value="movie">Film</option>
                    <option value="tv">Serie</option>
                    <option value="documentary">Documentaire</option>
                </select>
            </div>
            <div style="display: flex; flex-direction: column; min-width: 120px;">
                <label style="font-size: 12px; font-weight: bold; margin-bottom: 2px;">Genre:</label>
                <select id="genreFilter" multiple size="4" onchange="renderTable()" style="padding: 6px; border: 1px solid #cbd5e0; border-radius: 4px; font-size: 12px;">
                    <option value="Actie">Actie</option>
                    <option value="Animatie">Animatie</option>
                    <option value="Avontuur">Avontuur</option>
                    <option value="Biografie">Biografie</option>
                    <option value="Dystopisch">Dystopisch</option>
                    <option value="Documentaire">Documentaire</option>
                    <option value="Drama">Drama</option>
                    <option value="Familie">Familie</option>
                    <option value="Fantasy">Fantasy</option>
                    <option value="Horror">Horror</option>
                    <option value="Komedie">Komedie</option>
                    <option value="Misdaad">Misdaad</option>
                    <option value="Mysterie">Mysterie</option>
                    <option value="Musical">Musical</option>
                    <option value="Muziek">Muziek</option>
                    <option value="Oorlog">Oorlog</option>
                    <option value="Romantiek">Romantiek</option>
                    <option value="Science Fiction">Science Fiction</option>
                    <option value="Thriller">Thriller</option>
                    <option value="Western">Western</option>
                </select>
            </div>
            <div style="display: flex; flex-direction: column; min-width: 120px;">
                <label style="font-size: 12px; font-weight: bold; margin-bottom: 2px;">Streaming:</label>
                <select id="streamingFilter" multiple size="4" onchange="renderTable()" style="padding: 6px; border: 1px solid #cbd5e0; border-radius: 4px; font-size: 12px;">
                    <option value="Amazon Prime Video">Prime Video</option>
                    <option value="Apple TV+">Apple TV+</option>
                    <option value="Disney+">Disney+</option>
                    <option value="HBO Max">HBO Max</option>
                    <option value="Netflix">Netflix</option>
                    <option value="NPO Start">NPO Start</option>
                    <option value="Pathé Thuis">Pathé Thuis</option>
                    <option value="Sky Showtime">Sky Showtime</option>
                    <option value="Videoland">Videoland</option>
                </select>
            </div>
            <div style="display: flex; flex-direction: column; min-width: 120px;">
                <label style="font-size: 12px; font-weight: bold; margin-bottom: 2px;">Continent:</label>
                <select id="continentFilter" onchange="renderTable()" style="padding: 6px; border: 1px solid #cbd5e0; border-radius: 4px; font-size: 12px;">
                    <option value="">Alle continenten</option>
                    <option value="Amerikaans">Amerikaans</option>
                    <option value="Afrikaans">Afrikaans</option>
                    <option value="Aziatisch">Aziatisch</option>
                    <option value="Europees">Europees</option>
                    <option value="Oost-Europees">Oost-Europees</option>
                    <option value="Oceanië">Oceanië</option>
                    <option value="Zuid-Amerikaans">Zuid-Amerikaans</option>
                </select>
            </div>
            <div style="display: flex; flex-direction: column; min-width: 120px;">
                <label style="font-size: 12px; font-weight: bold; margin-bottom: 2px;">Bekeken:</label>
                <select id="watchedFilter" onchange="renderTable()" style="padding: 6px; border: 1px solid #cbd5e0; border-radius: 4px; font-size: 12px;">
                    <option value="">Alle status</option>
                    <option value="watched">Bekeken</option>
                    <option value="not-watched">Niet bekeken</option>
                </select>
            </div>
        </div>
        
        <div class="buttons">
            <button class="add-button" onclick="toggleAddForm()">Nieuwe film toevoegen</button>
            <button class="export-button" onclick="exportToExcel()">Exporteer naar Excel</button>
        </div>

        <div class="add-form" id="addForm">
            <h3>Nieuwe film toevoegen</h3>
            <input type="text" id="addTitle" placeholder="Titel (verplicht)">
            <input type="text" id="addTranslatedTitle" placeholder="Nederlandse titel">
            <select id="addType">
                <option value="movie">Film</option>
                <option value="tv">Serie</option>
                <option value="documentary">Documentaire</option>
            </select>
            <input type="number" id="addYear" placeholder="Jaar" min="1900" max="2100">
            <input type="text" id="addGenre" placeholder="Genre (bv. Actie, Thriller)">
            <input type="text" id="addCountry" placeholder="Land">
            <input type="text" id="addDuration" placeholder="Duur (minuten of afleveringen)">
            <input type="text" id="addActor" placeholder="Acteur">
            <input type="text" id="addPrice" placeholder="Prijs (€)">
            <input type="text" id="addStreaming" placeholder="Streaming (bv. Netflix)">
            <textarea id="addDescription" placeholder="Omschrijving"></textarea>
            <button onclick="addNewMedia()">Toevoegen</button>
            <button class="cancel-button" onclick="toggleAddForm()">Annuleren</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Titel</th>
                        <th>Type</th>
                        <th>Jaar</th>
                        <th>Genre</th>
                        <th>Land</th>
                        <th>Duur</th>
                        <th>Acteur</th>
                        <th>Prijs</th>
                        <th>Streaming</th>
                        <th>Bekeken</th>
                        <th>Acties</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        // Lokale opslag
        let mediaLibrary = JSON.parse(localStorage.getItem('mediaLibrary')) || [];

        // DOM elementen
        const tableBody = document.getElementById('tableBody');
        const addForm = document.getElementById('addForm');
        const editForm = document.getElementById('editForm');

        // Toggle add form
        function toggleAddForm() {
            if (addForm.style.display === 'block') {
                addForm.style.display = 'none';
            } else {
                addForm.style.display = 'block';
                // Scroll naar het formulier voor betere zichtbaarheid
                addForm.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        // Voeg nieuwe media toe
        function addNewMedia() {
            const title = document.getElementById('addTitle').value.trim();
            if (!title) {
                alert('Vul ten minste een titel in!');
                return;
            }

            const newMedia = {
                id: Date.now(),
                title: title,
                translated_title: document.getElementById('addTranslatedTitle').value.trim() || '',
                media_type: document.getElementById('addType').value || 'movie',
                release_date: document.getElementById('addYear').value ? `${document.getElementById('addYear').value}-01-01` : '',
                genres: document.getElementById('addGenre').value ? document.getElementById('addGenre').value.split(',').map(name => ({ name: name.trim() })) : [],
                production_countries: document.getElementById('addCountry').value ? [{ name: document.getElementById('addCountry').value.trim() }] : [],
                runtime: document.getElementById('addDuration').value ? parseInt(document.getElementById('addDuration').value) : null,
                lead_actor: document.getElementById('addActor').value.trim() || '',
                price: document.getElementById('addPrice').value.trim() || '',
                streaming_services: document.getElementById('addStreaming').value ? document.getElementById('addStreaming').value.split(',').map(name => name.trim()) : [],
                description: document.getElementById('addDescription').value.trim() || '',
                watched: false,
                added_date: new Date().toISOString()
            };

            mediaLibrary.push(newMedia);
            saveLibrary();
            renderTable();
            toggleAddForm();
            resetAddForm();
        }

        // Reset formulier
        function resetAddForm() {
            document.getElementById('addTitle').value = '';
            document.getElementById('addTranslatedTitle').value = '';
            document.getElementById('addYear').value = '';
            document.getElementById('addGenre').value = '';
            document.getElementById('addCountry').value = '';
            document.getElementById('addDuration').value = '';
            document.getElementById('addActor').value = '';
            document.getElementById('addPrice').value = '';
            document.getElementById('addStreaming').value = '';
            document.getElementById('addDescription').value = '';
        }

        // Sla bibliotheek op
        function saveLibrary() {
            localStorage.setItem('mediaLibrary', JSON.stringify(mediaLibrary));
        }

        // Haal continent op basis van land
        function getContinent(country) {
            if (!country) return 'Onbekend';
            
            const countryLower = country.toLowerCase();
            
            // Noord-Amerika
            const northAmerica = ['united states', 'usa', 'canada', 'mexico', 'united states of america'];
            if (northAmerica.includes(countryLower)) return 'Amerikaans';
            
            // Zuid-Amerika
            const southAmerica = ['brazil', 'argentina', 'colombia', 'peru', 'chile', 'venezuela', 'ecuador', 'bolivia', 'paraguay', 'uruguay'];
            if (southAmerica.includes(countryLower)) return 'Zuid-Amerikaans';
            
            // West-Europa
            const westernEurope = ['netherlands', 'belgium', 'france', 'germany', 'united kingdom', 'uk', 'ireland', 'luxembourg', 'switzerland', 'austria', 'denmark', 'norway', 'sweden', 'finland', 'iceland', 'spain', 'portugal', 'italy'];
            if (westernEurope.includes(countryLower)) return 'Europees';
            
            // Oost-Europa
            const easternEurope = ['poland', 'russia', 'hungary', 'czech republic', 'slovakia', 'romania', 'bulgaria', 'ukraine', 'belarus', 'moldova', 'serbia', 'croatia', 'slovenia', 'bosnia', 'montenegro', 'albania', 'greece', 'turkey', 'cyprus'];
            if (easternEurope.includes(countryLower)) return 'Oost-Europees';
            
            // Azië
            const asia = ['japan', 'china', 'south korea', 'north korea', 'india', 'thailand', 'vietnam', 'indonesia', 'malaysia', 'singapore', 'philippines', 'taiwan', 'hong kong'];
            if (asia.includes(countryLower)) return 'Aziatisch';
            
            // Afrika
            const africa = ['south africa', 'nigeria', 'egypt', 'morocco', 'kenya', 'ghana', 'algeria', 'ethiopia'];
            if (africa.includes(countryLower)) return 'Afrikaans';
            
            // Oceanië
            const oceania = ['australia', 'new zealand', 'fiji', 'papua new guinea'];
            if (oceania.includes(countryLower)) return 'Oceanië';
            
            return 'Onbekend';
        }

        // Toggle bewerk-formulier
        function toggleEditForm() {
            if (editForm.style.display === 'block') {
                editForm.style.display = 'none';
            } else {
                editForm.style.display = 'block';
                editForm.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        // Laad film in bewerk-formulier
        function loadEditForm(id) {
            const media = mediaLibrary.find(item => item.id === id);
            if (!media) return;

            document.getElementById('editId').value = media.id;
            document.getElementById('editTitle').value = media.title || '';
            document.getElementById('editTranslatedTitle').value = media.translated_title || '';
            document.getElementById('editType').value = media.media_type || 'movie';
            document.getElementById('editYear').value = media.release_date ? new Date(media.release_date).getFullYear() : '';
            document.getElementById('editGenre').value = media.genres ? media.genres.map(g => g.name).join(', ') : '';
            document.getElementById('editCountry').value = media.production_countries && media.production_countries[0] ? media.production_countries[0].name : '';
            document.getElementById('editDuration').value = media.media_type === 'movie' && media.runtime ? media.runtime : media.number_of_episodes || '';
            document.getElementById('editActor').value = media.lead_actor || '';
            document.getElementById('editPrice').value = media.price || '';
            document.getElementById('editStreaming').value = media.streaming_services ? media.streaming_services.join(', ') : '';
            document.getElementById('editDescription').value = media.description || '';

            toggleEditForm();
        }

        // Sla bewerkte film op
        function saveEditedMedia() {
            const id = parseInt(document.getElementById('editId').value);
            const media = mediaLibrary.find(item => item.id === id);
            if (!media) return;

            media.title = document.getElementById('editTitle').value.trim() || media.title;
            media.translated_title = document.getElementById('editTranslatedTitle').value.trim() || '';
            media.media_type = document.getElementById('editType').value || media.media_type;
            media.release_date = document.getElementById('editYear').value ? `${document.getElementById('editYear').value}-01-01` : media.release_date;
            media.genres = document.getElementById('editGenre').value ? document.getElementById('editGenre').value.split(',').map(name => ({ name: name.trim() })) : media.genres || [];
            media.production_countries = document.getElementById('editCountry').value ? [{ name: document.getElementById('editCountry').value.trim() }] : media.production_countries || [];
            
            const durationValue = document.getElementById('editDuration').value.trim();
            if (media.media_type === 'movie' && durationValue) {
                media.runtime = parseInt(durationValue);
            } else if (media.media_type === 'tv' && durationValue) {
                media.number_of_episodes = parseInt(durationValue);
            }
            
            media.lead_actor = document.getElementById('editActor').value.trim() || '';
            media.price = document.getElementById('editPrice').value.trim() || '';
            media.streaming_services = document.getElementById('editStreaming').value ? document.getElementById('editStreaming').value.split(',').map(name => name.trim()) : media.streaming_services || [];
            media.description = document.getElementById('editDescription').value.trim() || '';

            saveLibrary();
            renderTable();
            toggleEditForm();
        }

        // Render tabel
        function renderTable() {
            tableBody.innerHTML = '';
            
            // Haal zoekterm en filters op
            const query = (document.getElementById('librarySearchInput').value || '').toLowerCase();
            const typeFilter = document.getElementById('typeFilter').value;
            const genreFilters = Array.from(document.getElementById('genreFilter').selectedOptions).map(option => option.value);
            const streamingFilters = Array.from(document.getElementById('streamingFilter').selectedOptions).map(option => option.value);
            const continentFilter = document.getElementById('continentFilter').value;
            const watchedFilter = document.getElementById('watchedFilter').value;
            
            // Filter bibliotheek
            const filteredLibrary = mediaLibrary.filter(media => {
                // Zoekfilter
                const title = (media.title || '').toLowerCase();
                const translatedTitle = (media.translated_title || '').toLowerCase();
                const description = (media.description || '').toLowerCase();
                const actor = (media.lead_actor || '').toLowerCase();
                const genres = media.genres ? media.genres.map(g => g.name.toLowerCase()).join(' ') : '';
                const country = media.production_countries && media.production_countries[0] ? media.production_countries[0].name.toLowerCase() : '';
                
                let matchesSearch = true;
                if (query) {
                    matchesSearch = title.includes(query) || 
                                   translatedTitle.includes(query) || 
                                   description.includes(query) || 
                                   actor.includes(query) || 
                                   genres.includes(query) || 
                                   country.includes(query);
                }
                
                // Type filter
                let matchesType = true;
                if (typeFilter) {
                    matchesType = media.media_type === typeFilter;
                }
                
                // Genre filter (meerdere genres mogelijk)
                let matchesGenre = true;
                if (genreFilters.length > 0) {
                    const mediaGenres = media.genres ? media.genres.map(g => g.name) : [];
                    matchesGenre = genreFilters.some(genre => mediaGenres.includes(genre));
                }
                
                // Streaming filter (meerdere streamingdiensten mogelijk)
                let matchesStreaming = true;
                if (streamingFilters.length > 0) {
                    const mediaServices = media.streaming_services || [];
                    matchesStreaming = streamingFilters.some(service => 
                        mediaServices.some(ms => ms.toLowerCase() === service.toLowerCase())
                    );
                }
                
                // Continent filter
                let matchesContinent = true;
                if (continentFilter) {
                    const country = media.production_countries && media.production_countries[0] ? media.production_countries[0].name : '';
                    matchesContinent = getContinent(country) === continentFilter;
                }
                
                // Bekeken filter
                let matchesWatched = true;
                if (watchedFilter === 'watched') {
                    matchesWatched = media.watched;
                } else if (watchedFilter === 'not-watched') {
                    matchesWatched = !media.watched;
                }
                
                return matchesSearch && matchesType && matchesGenre && matchesStreaming && matchesContinent && matchesWatched;
            });

            if (filteredLibrary.length === 0) {
                const row = document.createElement('tr');
                row.innerHTML = '<td colspan="11" style="text-align: center;">Geen resultaten gevonden. Probeer een andere zoekterm.</td>';
                tableBody.appendChild(row);
                return;
            }

            filteredLibrary.forEach(media => {
                const row = document.createElement('tr');

                const type = media.media_type === 'movie' ? 'Film' : media.media_type === 'tv' ? 'Serie' : 'Documentaire';
                const title = media.title || 'Onbekend';
                const translatedTitle = media.translated_title || '';
                const year = media.release_date ? new Date(media.release_date).getFullYear() : 'Onbekend';
                const genres = media.genres && media.genres.length > 0 ? media.genres.map(g => g.name).join(', ') : 'Onbekend';
                const country = media.production_countries && media.production_countries.length > 0 ? media.production_countries[0].name : 'Onbekend';
                const duration = media.media_type === 'movie' && media.runtime ? `${media.runtime} min` : media.media_type === 'tv' && media.number_of_episodes ? `${media.number_of_episodes} afl.` : 'Onbekend';
                const actor = media.lead_actor || 'Onbekend';
                const price = media.price || 'Onbekend';
                const streaming = media.streaming_services && media.streaming_services.length > 0 ? media.streaming_services.join(', ') : 'Onbekend';

                row.innerHTML = `
                    <td>${title} ${translatedTitle ? `<br><span style="font-size: 12px; color: #4299e1;">(${translatedTitle})</span>` : ''}</td>
                    <td>${type}</td>
                    <td>${year}</td>
                    <td>${genres}</td>
                    <td>${country}</td>
                    <td>${duration}</td>
                    <td>${actor}</td>
                    <td>${price}</td>
                    <td>${streaming}</td>
                    <td>${media.watched ? 'Ja' : 'Nee'}</td>
                    <td class="actions">
                        <button class="remove-button" onclick="removeFromLibrary(${media.id})">Verwijder</button>
                        <button class="watched-button" onclick="toggleWatched(${media.id})">${media.watched ? 'Niet bekeken' : 'Bekeken'}</button>
                        <button class="edit-button" onclick="loadEditForm(${media.id})">Bewerk</button>
                    </td>
                `;

                tableBody.appendChild(row);
            });
        }

        // Verwijder uit bibliotheek
        function removeFromLibrary(id) {
            mediaLibrary = mediaLibrary.filter(item => item.id !== id);
            saveLibrary();
            renderTable();
        }

        // Toggle bekeken status
        function toggleWatched(id) {
            const media = mediaLibrary.find(item => item.id === id);
            if (media) {
                media.watched = !media.watched;
                saveLibrary();
                renderTable();
            }
        }

        // Exporteer naar Excel (CSV)
        function exportToExcel() {
            if (mediaLibrary.length === 0) {
                alert('Je bibliotheek is leeg.');
                return;
            }

            let csv = 'Titel,Nederlandse Titel,Type,Jaar,Genre,Land,Duur,Acteur,Prijs,Streaming,Bekeken,Toegevoegd op\n';

            mediaLibrary.forEach(media => {
                const type = media.media_type === 'movie' ? 'Film' : media.media_type === 'tv' ? 'Serie' : 'Documentaire';
                const title = media.title || 'Onbekend';
                const translatedTitle = media.translated_title || '';
                const year = media.release_date ? new Date(media.release_date).getFullYear() : 'Onbekend';
                const genres = media.genres && media.genres.length > 0 ? media.genres.map(g => g.name).join(', ') : 'Onbekend';
                const country = media.production_countries && media.production_countries.length > 0 ? media.production_countries[0].name : 'Onbekend';
                const duration = media.media_type === 'movie' && media.runtime ? `${media.runtime} min` : media.media_type === 'tv' && media.number_of_episodes ? `${media.number_of_episodes} afl.` : 'Onbekend';
                const actor = media.lead_actor || 'Onbekend';
                const price = media.price || 'Onbekend';
                const streaming = media.streaming_services && media.streaming_services.length > 0 ? media.streaming_services.join(', ') : 'Onbekend';
                const watched = media.watched ? 'Ja' : 'Nee';
                const addedDate = media.added_date ? new Date(media.added_date).toLocaleDateString('nl-NL') : 'Onbekend';

                csv += `"${title}","${translatedTitle}","${type}","${year}","${genres}","${country}","${duration}","${actor}","${price}","${streaming}","${watched}","${addedDate}"\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'mediabibliotheek.csv';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Laad bibliotheek bij starten
        renderTable();
    </script>
</body>
</html>
